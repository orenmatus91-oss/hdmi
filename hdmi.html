<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HDMI">
<meta name="theme-color" content="#060608">
<title>HDMI — Universal AI Client</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   HDMI — UNIVERSAL AI CLIENT
   Dark glassmorphism · Prismatic accents · Pixel-perfect
═══════════════════════════════════════════════════════ */

:root {
  --bg:       #060608;
  --bg1:      #0d0d14;
  --bg2:      #12121c;
  --bg3:      #181828;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #eeeef8;
  --text2:    #9090b0;
  --text3:    #50506a;
  --accent:   #7b2fff;
  --accent2:  #00d4ff;
  --accent3:  #ff2fa0;
  --grad:     linear-gradient(135deg, #00d4ff 0%, #7b2fff 50%, #ff2fa0 100%);
  --grad2:    linear-gradient(135deg, #7b2fff 0%, #ff2fa0 100%);
  --glow:     0 0 20px rgba(123,47,255,0.25);
  --glow2:    0 0 30px rgba(0,212,255,0.2);
  --radius:   12px;
  --radius2:  8px;
  --radius3:  6px;
  --mono:     'Fira Code', monospace;
  --sans:     'Outfit', sans-serif;
  --head:     'Space Grotesk', sans-serif;
  --sb-width: 260px;
  --topbar-h: 52px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--sans);
  color: var(--text);
  background: var(--bg);
  font-size: 14px;
  line-height: 1.6;
}

/* ── BACKGROUND FX ── */
#canvas-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.35;
}

/* ── OVERLAY ── */
#overlay {
  display: none; position: fixed; inset: 0; z-index: 45;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(2px);
}

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
#sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--sb-width); z-index: 50;
  display: flex; flex-direction: column;
  background: rgba(9,9,18,0.97);
  border-right: 1px solid var(--border);
  backdrop-filter: blur(20px);
  transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}
#sidebar.closed { transform: translateX(calc(-1 * var(--sb-width))); }

.sb-brand {
  display: flex; align-items: center; gap: 10px;
  padding: max(env(safe-area-inset-top), 16px) 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-logo {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--bg3); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.sb-logo svg { width: 20px; height: 20px; }
.sb-logo::before {
  content: ''; position: absolute; inset: 0;
  background: var(--grad); opacity: 0.15;
}
.sb-brand-text { line-height: 1; }
.sb-brand-name {
  font-family: var(--head); font-size: 16px; font-weight: 700;
  background: var(--grad); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 0.04em;
}
.sb-brand-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }

.sb-new-btn {
  margin: 10px 12px 6px;
  padding: 9px 14px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: var(--radius2);
  color: var(--text); font-family: var(--sans); font-size: 13px;
  font-weight: 500; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.18s; flex-shrink: 0;
  width: calc(100% - 24px);
}
.sb-new-btn:hover { background: var(--bg3); border-color: var(--accent); color: var(--text); box-shadow: 0 0 12px rgba(123,47,255,0.2); }
.sb-new-btn .nb-icon { font-size: 15px; }

.sb-section {
  padding: 10px 16px 4px; font-size: 9.5px; font-family: var(--mono);
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3);
  flex-shrink: 0;
}

.sb-list {
  flex: 1; overflow-y: auto; padding: 2px 8px 8px;
  display: flex; flex-direction: column; gap: 2px;
}
.sb-list::-webkit-scrollbar { width: 3px; }
.sb-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.conv-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: var(--radius2);
  cursor: pointer; transition: all 0.15s; position: relative;
}
.conv-row:hover { background: rgba(255,255,255,0.04); }
.conv-row.active { background: rgba(123,47,255,0.12); border: 1px solid rgba(123,47,255,0.2); }
.conv-row.active::before {
  content: ''; position: absolute; left: -1px; top: 6px; bottom: 6px;
  width: 2px; background: var(--grad); border-radius: 2px;
}
.conv-emoji { font-size: 14px; flex-shrink: 0; }
.conv-name { flex: 1; font-size: 12.5px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-row.active .conv-name { color: var(--text); }
.conv-del { display: none; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 4px; transition: color 0.15s; }
.conv-row:hover .conv-del { display: block; }
.conv-del:hover { color: #f87171; }

.sb-mem-section {
  flex-shrink: 0; border-top: 1px solid var(--border); padding: 10px 8px 8px;
}
.mem-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 8px 6px; font-size: 9.5px; font-family: var(--mono);
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3);
}
.mem-count { background: rgba(123,47,255,0.25); color: #c084fc; border-radius: 999px; padding: 1px 7px; font-size: 9px; }
.mem-list { max-height: 110px; overflow-y: auto; padding: 0 4px; }
.mem-list::-webkit-scrollbar { width: 2px; }
.mem-list::-webkit-scrollbar-thumb { background: var(--border); }
.mem-item {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 6px; border-radius: 6px;
  font-size: 11.5px; color: var(--text2); cursor: default;
  transition: background 0.12s;
}
.mem-item:hover { background: rgba(255,255,255,0.03); }
.mem-item-icon { font-size: 11px; flex-shrink: 0; }
.mem-item-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mem-item-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 11px; opacity: 0; transition: opacity 0.12s; }
.mem-item:hover .mem-item-del { opacity: 1; }

/* ══════════════════════════════════════
   MAIN WRAPPER
══════════════════════════════════════ */
#app {
  position: fixed; inset: 0; left: var(--sb-width);
  display: flex; flex-direction: column;
  transition: left 0.26s cubic-bezier(0.4,0,0.2,1);
  z-index: 1;
}
#app.full { left: 0; }

@media (max-width: 700px) {
  #app { left: 0 !important; }
}

/* ── TOPBAR ── */
#topbar {
  height: calc(var(--topbar-h) + env(safe-area-inset-top));
  padding-top: max(env(safe-area-inset-top), 10px);
  display: flex; align-items: center; gap: 8px; padding-left: 14px; padding-right: 14px;
  background: rgba(6,6,8,0.9); backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10;
}

.tb-btn {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: var(--radius3); color: var(--text2); cursor: pointer; font-size: 14px;
  transition: all 0.15s; flex-shrink: 0;
}
.tb-btn:hover { background: rgba(123,47,255,0.15); border-color: var(--accent); color: var(--text); }
.tb-btn.active { background: rgba(123,47,255,0.2); border-color: var(--accent); color: var(--text); }

.provider-chip {
  display: flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 999px; padding: 5px 12px; cursor: pointer; transition: all 0.15s;
  flex-shrink: 0; min-width: 0;
}
.provider-chip:hover { border-color: var(--border2); }
.provider-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.provider-dot.ok { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.6); }
.provider-dot.warn { background: #fbbf24; box-shadow: 0 0 6px rgba(251,191,36,0.5); }
.provider-dot.none { background: var(--text3); }
.provider-name { font-family: var(--mono); font-size: 11px; color: var(--text2); white-space: nowrap; }

.model-select {
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 999px; color: var(--text); font-family: var(--mono);
  font-size: 11px; padding: 5px 10px; outline: none; cursor: pointer; transition: all 0.15s;
  flex-shrink: 0; max-width: 180px;
}
.model-select:hover, .model-select:focus { border-color: var(--border2); }
.model-select option { background: var(--bg2); }

.tb-title { flex: 1; font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }

.cap-badges { display: flex; gap: 4px; flex-shrink: 0; }
.cap-badge {
  font-family: var(--mono); font-size: 9px; padding: 2px 7px; border-radius: 999px;
  border: 1px solid; letter-spacing: 0.04em; white-space: nowrap;
}
.cap-badge.vision { border-color: rgba(0,212,255,0.35); color: #00d4ff; background: rgba(0,212,255,0.07); }
.cap-badge.image  { border-color: rgba(255,47,160,0.35); color: #ff2fa0; background: rgba(255,47,160,0.07); }
.cap-badge.code   { border-color: rgba(123,47,255,0.35); color: #c084fc; background: rgba(123,47,255,0.07); }

/* ── PROVIDER DRAWER ── */
#provider-drawer {
  flex-shrink: 0; overflow: hidden; max-height: 0;
  background: rgba(6,6,12,0.96); border-bottom: 1px solid var(--border);
  transition: max-height 0.3s ease;
}
#provider-drawer.open {
  max-height: calc(100dvh - var(--topbar-h) - env(safe-area-inset-top) - 120px);
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
#provider-drawer.open::-webkit-scrollbar { width: 4px; }
#provider-drawer.open::-webkit-scrollbar-thumb { background: rgba(123,47,255,0.35); border-radius: 2px; }

.pd-inner { padding: 16px 18px 18px; max-width: 860px; margin: 0 auto; }
.pd-heading {
  font-family: var(--head); font-size: 13px; font-weight: 600;
  background: var(--grad); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 14px; letter-spacing: 0.02em;
}

.provider-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px;
  margin-bottom: 14px;
}
@media (max-width: 700px) {
  .provider-grid { grid-template-columns: 1fr; }
}

.prov-card {
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  transition: all 0.2s; cursor: default;
}
.prov-card.has-key { border-color: rgba(123,47,255,0.25); background: rgba(123,47,255,0.04); }
.prov-card-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.prov-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.prov-info { flex: 1; min-width: 0; }
.prov-name { font-family: var(--head); font-size: 13px; font-weight: 600; color: var(--text); }
.prov-caps { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.prov-status { font-size: 10px; font-family: var(--mono); }
.prov-status.ok { color: #4ade80; }
.prov-status.none { color: var(--text3); }

.prov-key-row { display: flex; align-items: center; gap: 6px; }
.prov-key-input {
  flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: var(--radius3); color: var(--text); font-family: var(--mono);
  font-size: 11px; padding: 6px 8px; outline: none; transition: border-color 0.2s;
  min-width: 0;
}
.prov-key-input:focus { border-color: rgba(123,47,255,0.5); }
.prov-key-input::placeholder { color: var(--text3); }
.eye-btn {
  background: none; border: none; color: var(--text3); cursor: pointer;
  font-size: 13px; padding: 2px 4px; transition: color 0.15s; flex-shrink: 0;
}
.eye-btn:hover { color: var(--text); }
.save-prov-btn {
  padding: 6px 12px; background: rgba(123,47,255,0.2);
  border: 1px solid rgba(123,47,255,0.4); border-radius: var(--radius3);
  color: #c084fc; font-family: var(--mono); font-size: 11px;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0; white-space: nowrap;
}
.save-prov-btn:hover { background: rgba(123,47,255,0.35); }

.prov-extra-keys { margin-top: 8px; }
.prov-extra-label { font-size: 9.5px; font-family: var(--mono); color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
.prov-key-slot { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.slot-num { font-size: 9.5px; font-family: var(--mono); color: var(--text3); width: 32px; flex-shrink: 0; }

/* ── MEMORY DRAWER ── */
#memory-drawer {
  flex-shrink: 0; overflow: hidden; max-height: 0;
  background: rgba(6,6,12,0.96); border-bottom: 1px solid var(--border);
  transition: max-height 0.3s ease;
}
#memory-drawer.open { max-height: 320px; }
.md-inner { padding: 14px 18px 16px; max-width: 860px; margin: 0 auto; }
.md-heading {
  font-family: var(--head); font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px;
}
.md-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
.md-input {
  flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: var(--radius2); color: var(--text); font-family: var(--sans);
  font-size: 13px; padding: 8px 12px; outline: none; transition: border-color 0.2s;
}
.md-input:focus { border-color: rgba(123,47,255,0.5); }
.md-input::placeholder { color: var(--text3); }
.md-add-btn {
  padding: 8px 16px; background: rgba(123,47,255,0.2);
  border: 1px solid rgba(123,47,255,0.4); border-radius: var(--radius2);
  color: #c084fc; font-family: var(--sans); font-size: 13px;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.md-add-btn:hover { background: rgba(123,47,255,0.35); }
.md-all-list { max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
.md-all-list::-webkit-scrollbar { width: 3px; }
.md-all-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.md-entry {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  background: rgba(255,255,255,0.03); border-radius: var(--radius3);
  border: 1px solid var(--border); transition: all 0.12s;
}
.md-entry:hover { border-color: var(--border2); }
.md-entry-icon { font-size: 13px; flex-shrink: 0; }
.md-entry-text { flex: 1; font-size: 12.5px; color: var(--text2); }
.md-entry-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; transition: color 0.12s; }
.md-entry-del:hover { color: #f87171; }
.md-empty { font-size: 12px; color: var(--text3); font-family: var(--mono); padding: 12px; text-align: center; }

/* ── MESSAGES ── */
#messages {
  flex: 1; overflow-y: auto; padding: 24px 16px;
  display: flex; flex-direction: column; gap: 22px; scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: rgba(123,47,255,0.25); border-radius: 2px; }

/* Welcome */
.welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; gap: 20px;
  padding: 32px 20px;
  max-width: 600px; width: 100%; margin: auto;
  animation: wlc-in 0.5s ease;
}
@keyframes wlc-in { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

.wlc-logo {
  width: 80px; height: 80px; border-radius: 20px;
  background: var(--bg3); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center; position: relative;
  animation: logo-pulse 4s ease-in-out infinite;
}
.wlc-logo::before {
  content: ''; position: absolute; inset: -1px;
  border-radius: 21px; padding: 1px;
  background: var(--grad); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}
.wlc-logo svg { width: 42px; height: 42px; }
@keyframes logo-pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(123,47,255,0.3); }
  50%      { box-shadow: 0 0 0 16px rgba(123,47,255,0); }
}

.wlc-title {
  font-family: var(--head); font-size: 34px; font-weight: 700;
  background: var(--grad); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 0.02em;
}
.wlc-greeting-line1 {
  font-family: var(--head); font-size: 22px; font-weight: 600;
  color: var(--text); letter-spacing: -0.01em; margin-top: 4px;
  animation: wlc-in 0.6s ease 0.1s both;
}
.wlc-greeting-line2 {
  font-size: 15px; color: var(--text2); line-height: 1.6; max-width: 340px;
  animation: wlc-in 0.6s ease 0.25s both;
}
.wlc-key-nudge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(123,47,255,0.1); border: 1px solid rgba(123,47,255,0.25);
  border-radius: 999px; padding: 7px 16px;
  font-size: 13px; color: var(--text2);
  animation: wlc-in 0.6s ease 0.4s both;
}
.wlc-sub { color: var(--text2); font-size: 15px; max-width: 440px; line-height: 1.65; }

.sug-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
@media(max-width: 500px) { .sug-grid { grid-template-columns: 1fr; } }

.sug-card {
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 13px 15px;
  cursor: pointer; text-align: left; transition: all 0.2s;
}
.sug-card:hover { background: rgba(123,47,255,0.08); border-color: rgba(123,47,255,0.3); transform: translateY(-2px); box-shadow: var(--glow); }
.sug-icon { font-size: 18px; margin-bottom: 6px; display: block; }
.sug-title { font-size: 13px; font-weight: 600; color: var(--text); font-family: var(--head); margin-bottom: 3px; }
.sug-sub { font-size: 11.5px; color: var(--text2); line-height: 1.4; }

/* Message rows */
.msg-row {
  display: flex; gap: 12px; max-width: 820px; width: 100%;
  margin: 0 auto; animation: msg-in 0.22s ease;
}
@keyframes msg-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.msg-row.user { flex-direction: row-reverse; }

.msg-av {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.msg-row.ai   .msg-av { font-size: 16px; }

let state = {

function loadState() {
  try {
    const d = localStorage.getItem(STORE_KEY);
    if (d) {
      const parsed = JSON.parse(d);
      Object.assign(state, parsed);
    }
  } catch(e) {}
  // Ensure providers structure
  for (const pid of Object.keys(PROVIDERS)) {
    if (!state.providers[pid]) state.providers[pid] = { keys: ['','',''], activeKeyIdx: 0 };
  }
}

function saveState() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
}

function activeConv() {
  return state.convs.find(c => c.id === state.activeConvId) || null;
}

// ═══════════════════════════════════════════════════
// ANIMATED CANVAS BACKGROUND
// ═══════════════════════════════════════════════════
(function initCanvas() {
  const canvas = G('canvas-bg');
  const ctx = canvas.getContext('2d');
  let W, H;
  const particles = [];
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLS = ['#00d4ff','#7b2fff','#ff2fa0','#4ade80'];
  for (let i = 0; i < 55; i++) {
    particles.push({
      x: Math.random()*1800, y: Math.random()*900,
      r: Math.random()*1.5 + 0.4,
      vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
      c: COLS[Math.floor(Math.random()*COLS.length)],
      a: Math.random()*0.6+0.2,
    });
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    // Draw big blur orbs
    const orbs = [
      {x:W*0.15,y:H*0.15,r:300,c:'#7b2fff',a:0.08},
      {x:W*0.85,y:H*0.8,r:260,c:'#00d4ff',a:0.06},
      {x:W*0.5,y:H*0.5,r:200,c:'#ff2fa0',a:0.04},
    ];
    for (const o of orbs) {
      const g = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0, o.c + Math.round(o.a*255).toString(16).padStart(2,'0'));
      g.addColorStop(1, o.c + '00');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
    }
    // Particles
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.globalAlpha = p.a * 0.7;
      ctx.fillStyle = p.c;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
})();

// PROVIDER LOGIC
// ═══════════════════════════════════════════════════
function getActiveProvider() {
  if (!state.activeProviderId) return null;
  return PROVIDERS[state.activeProviderId] || null;
}

function getActiveKey() {
  const pid = state.activeProviderId;
  if (!pid || !state.providers[pid]) return null;
  const pd = state.providers[pid];
  const validKeys = pd.keys.map((k,i) => ({k, i})).filter(x => x.k.trim());
  if (!validKeys.length) return null;
  const idx = validKeys.findIndex(x => x.i === pd.activeKeyIdx);
  return idx >= 0 ? validKeys[idx].k : validKeys[0].k;
}

function hasAnyKey() {
  return Object.values(state.providers).some(pd => pd.keys.some(k => k.trim()));
}

function getFirstValidProvider() {
  for (const [pid, pd] of Object.entries(state.providers)) {
    if (pd.keys.some(k => k.trim())) return pid;
  }
  return null;
}

function autoSelectProvider() {
  if (state.activeProviderId && getActiveKey()) return;
  const pid = getFirstValidProvider();
  if (pid) {
    state.activeProviderId = pid;
    const prov = PROVIDERS[pid];
    if (!state.activeModel || !prov.models.find(m => m.id === state.activeModel)) {
      state.activeModel = prov.models[0].id;
    }
  } else {
    state.activeProviderId = null;
    state.activeModel = null;
  }
}

function updateProviderUI() {
  autoSelectProvider();
  const prov = getActiveProvider();
  const key = getActiveKey();
  const dot = G('provDot');
  const name = G('provName');
  const sProv = G('sProv');
  const sKey = G('sKey');

  if (prov && key) {
    dot.className = 'provider-dot ok';
    name.textContent = prov.name;
    sProv.textContent = prov.name;
    const pd = state.providers[prov.id];
    const kidx = pd.keys.map((k,i)=>({k,i})).filter(x=>x.k.trim()).findIndex(x=>x.i===pd.activeKeyIdx);
    sKey.textContent = 'Key ' + (pd.activeKeyIdx + 1);
  } else if (hasAnyKey()) {
    dot.className = 'provider-dot warn';
    name.textContent = 'Select Provider';
    sProv.textContent = '—'; sKey.textContent = '—';
  } else {
    dot.className = 'provider-dot none';
    name.textContent = 'No Key';
    sProv.textContent = '—'; sKey.textContent = '—';
  }

  // Update model select
  populateModelSelect();

  // Capability badges
  updateCapBadges();

  G('sendBtn').disabled = !hasAnyKey();
  saveState();
}

function populateModelSelect() {
  const sel = G('modelSelect');
  sel.innerHTML = '';
  const prov = getActiveProvider();
  if (!prov) {
    // Show all providers' models grouped
    for (const [pid, p] of Object.entries(PROVIDERS)) {
      const grp = document.createElement('optgroup');
      grp.label = p.name;
      p.models.forEach(m => {
        const o = document.createElement('option');
        o.value = pid + ':' + m.id;
        o.textContent = m.name;
        grp.appendChild(o);
      });
      sel.appendChild(grp);
    }
  } else {
    prov.models.forEach(m => {
      const o = document.createElement('option');
      o.value = m.id;
      o.textContent = m.name;
      if (m.id === state.activeModel) o.selected = true;
      sel.appendChild(o);
    });
  }
}

function updateCapBadges() {
  const prov = getActiveProvider();
  const badges = G('capBadges');
  badges.innerHTML = '';
  if (!prov) return;
  const model = prov.models.find(m => m.id === state.activeModel);
  const caps = model ? model.caps : prov.caps;
  if (caps.vision) badges.innerHTML += '<span class="cap-badge vision">👁 Vision</span>';
  if (caps.image)  badges.innerHTML += '<span class="cap-badge image">🎨 Image Gen</span>';
  if (caps.code)   badges.innerHTML += '<span class="cap-badge code">💻 Code</span>';
}

G('modelSelect').addEventListener('change', function() {
  const val = this.value;
  if (val.includes(':')) {
    const [pid, mid] = val.split(':');
    state.activeProviderId = pid;
    state.activeModel = mid;
  } else {
    state.activeModel = val;
  }
  // Check if selected model is image-gen-only
  const prov = getActiveProvider();
  if (prov) {
    const model = prov.models.find(m => m.id === state.activeModel);
    if (model && model.caps.image && !model.caps.chat) {
      setInputMode('image');
    }
  }
  updateCapBadges();
  saveState();
});

      <div class="prov-card-header">
        <div class="prov-icon" style="background:${prov.color}22;border:1px solid ${prov.color}44">${prov.icon}</div>
        <div class="prov-info">

          <div class="prov-caps">${capsStr}</div>

        <button class="eye-btn" data-pid="${pid}" data-ki="0">👁</button>

      ${prov.multiKey ? `
        <div class="prov-extra-keys">
          <div class="prov-extra-label">Failover keys (optional)</div>
          <div class="prov-key-slot"><span class="slot-num">KEY 2</span><input type="password" class="prov-key-input" id="pk_${pid}_1" value="${esc(pd.keys[1]||'')}" placeholder="Backup key…" autocomplete="off"><button class="eye-btn" data-pid="${pid}" data-ki="1">👁</button></div>
          <div class="prov-key-slot"><span class="slot-num">KEY 3</span><input type="password" class="prov-key-input" id="pk_${pid}_2" value="${esc(pd.keys[2]||'')}" placeholder="Backup key…" autocomplete="off"><button class="eye-btn" data-pid="${pid}" data-ki="2">👁</button></div>
        </div>
      ` : ''}
      ${hasKey ? `<div style="margin-top:8px;font-size:10.5px;font-family:var(--mono);color:var(--text3)">
        Active: Key ${pd.activeKeyIdx+1} · <button style="background:none;border:none;color:#c084fc;cursor:pointer;font-family:var(--mono);font-size:10.5px;" onclick="setActiveProvider('${pid}')">Use this provider →</button>
      </div>` : ''}
    `;
    grid.appendChild(card);
  }

  // Eye buttons
  grid.querySelectorAll('.eye-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const pid = this.dataset.pid, ki = this.dataset.ki;
      const inp = G('pk_'+pid+'_'+ki);
      if (inp) inp.type = inp.type === 'password' ? 'text' : 'password';
    });
  });

  // Save buttons
  grid.querySelectorAll('.save-prov-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const pid = this.dataset.pid;
      const pd = state.providers[pid];
      for (let i = 0; i < 3; i++) {
        const inp = G('pk_'+pid+'_'+i);
        if (inp) pd.keys[i] = inp.value.trim();
      }
      const validIdx = pd.keys.findIndex(k => k.trim());
      if (validIdx >= 0) pd.activeKeyIdx = validIdx;
      // Auto-select this provider if none active
      if (!state.activeProviderId && pd.keys.some(k=>k.trim())) {
        state.activeProviderId = pid;
        state.activeModel = PROVIDERS[pid].models[0].id;
      }
      saveState();
      renderProviderGrid();
      updateProviderUI();
      const count = pd.keys.filter(k=>k.trim()).length;
      toast(`${PROVIDERS[pid].name}: ${count} key(s) saved`, 'ok');
    });
  });
}

window.setActiveProvider = function(pid) {
  state.activeProviderId = pid;
  state.activeModel = PROVIDERS[pid].models[0].id;
  saveState();
  updateProviderUI();
  closeAllDrawers();
  toast('Switched to ' + PROVIDERS[pid].name, 'info');
};

function addMemory(text) {
  if (!text.trim()) return;
  state.memory.push({ id: uuid(), text: text.trim(), icon: rand(MEM_ICONS), ts: Date.now() });
  saveState();
  renderMemorySidebar();
  if (memDrawerOpen) renderMemoryDrawer();

}

function deleteMemory(id) {
  state.memory = state.memory.filter(m => m.id !== id);

  renderMemorySidebar();
  if (memDrawerOpen) renderMemoryDrawer();
}

function createConv(firstMsg) {
  const id = uuid();
  const title = firstMsg ? firstMsg.slice(0,50)+(firstMsg.length>50?'…':'') : 'New conversation';
  const conv = { id, title, emoji: rand(EMOJIS), messages: [], createdAt: Date.now() };
  state.convs.unshift(conv);
  state.activeConvId = id;
  saveState(); renderSidebar();
  return conv;
}

function deleteConv(id) {
  state.convs = state.convs.filter(c => c.id !== id);
  if (state.activeConvId === id) state.activeConvId = state.convs[0]?.id || null;
  saveState(); renderSidebar(); renderMessages(); updateStats();
  toast('Deleted', '');
}

function switchConv(id) {
  state.activeConvId = id;
  saveState(); renderSidebar(); renderMessages(); updateStats();
  if (window.innerWidth <= 700) setSidebar(false);
}

  const el = G('convList');

    return;

  state.convs.forEach(c => {

    d.className = 'conv-row' + (c.id === state.activeConvId ? ' active' : '');
    d.innerHTML = `<span class="conv-emoji">${c.emoji}</span><span class="conv-name">${esc(c.title)}</span><button class="conv-del" data-id="${c.id}">✕</button>`;

function buildMsgEl(msg, idx) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-row ' + (msg.role === 'user' ? 'user' : 'ai');

  const isUser = msg.role === 'user';
  const provIcon = msg.providerId ? getProviderAvatar(msg.providerId) : (getActiveProvider()?.icon || '🤖');
  const av = isUser ? 'You' : provIcon;
  const avStyle = isUser ? '' : `style="background:${PROVIDERS[msg.providerId||state.activeProviderId]?.color||'#7b2fff'}22;border:1px solid ${PROVIDERS[msg.providerId||state.activeProviderId]?.color||'#7b2fff'}44"`;

  // Build bubble content
  let bubbleHtml = '';

  // Key switch badge
  if (msg.keySwitch) {
    bubbleHtml += `<div class="key-switch-badge">⚡ Switched to Key ${msg.keySwitch} — context preserved</div>`;
  }

  // File attachments preview
  if (msg.files && msg.files.length) {
    msg.files.forEach(f => {
      if (f.type === 'image') {
        bubbleHtml += `<div class="file-preview">🖼 ${esc(f.name)}</div>`;
      } else {
        bubbleHtml += `<div class="file-preview">📎 ${esc(f.name)} (${f.type})</div>`;
      }
    });
  }

  // Content
  if (msg.type === 'image_result' && msg.images) {
    msg.images.forEach(url => {
      bubbleHtml += `<img class="gen-image" src="${esc(url)}" alt="Generated image" loading="lazy">`;
    });
    if (msg.content) bubbleHtml += `<div style="margin-top:6px;font-size:12px;color:var(--text2);">${esc(msg.content)}</div>`;
  } else {
    bubbleHtml += isUser
      ? esc(msg.content||'').replace(/\n/g,'<br>')
      : parseMarkdown(msg.content||'');
  }

  const regenBtn = !isUser ? `<button class="ma-btn" onclick="regenFrom(${idx})" title="Regenerate">↺</button>` : '';
  const editBtn = isUser ? `<button class="ma-btn" onclick="editMsg(${idx})" title="Edit & resend">✎</button>` : '';
  const modelTag = msg.model ? `<span style="font-size:9.5px;font-family:var(--mono);color:var(--text3);margin-left:2px;">${esc(msg.model)}</span>` : '';

  wrap.innerHTML = `
    <div class="msg-av" ${avStyle}>${av}</div>
    <div class="msg-body">
      <div class="bubble">${bubbleHtml}</div>
      <div class="msg-meta">
        <span class="msg-time">${fmtTime(msg.ts)}</span>
        ${modelTag}
        <div class="msg-acts">
          <button class="ma-btn" onclick="copyMsg(${idx})" title="Copy">⎘</button>
          ${regenBtn}${editBtn}
        </div>
      </div>
    </div>`;

  // Code block copy buttons
  wrap.querySelectorAll('pre').forEach(pre => {
    const lang = pre.querySelector('code')?.className?.replace('lang-','') || '';
    const header = document.createElement('div');
    header.className = 'code-header';
    header.innerHTML = `<span>${lang||'code'}</span><button class="code-copy-btn">Copy</button>`;
    header.querySelector('button').onclick = () => {
      const code = pre.querySelector('code');
      navigator.clipboard.writeText(code ? code.innerText : pre.innerText);
      header.querySelector('button').textContent = 'Copied!';
      setTimeout(() => header.querySelector('button').textContent = 'Copy', 1500);
    };
    pre.parentNode.insertBefore(header, pre);
    pre.style.borderTopLeftRadius = '0'; pre.style.borderTopRightRadius = '0';
    pre.style.marginTop = '0';
  });

  return wrap;
}

window.copyMsg = i => {
  const c = activeConv(); if (!c) return;
  navigator.clipboard.writeText(c.messages[i]?.content||'');
  toast('Copied!', 'ok');
};

window.regenFrom = i => {
  const c = activeConv(); if (!c) return;
  c.messages = c.messages.slice(0, i);
  saveState(); renderMessages(); sendToApi(c);
};

window.editMsg = i => {
  const c = activeConv(); if (!c) return;
  const m = c.messages[i]; if (!m) return;
  G('msgField').value = m.content; autoResize();
  c.messages = c.messages.slice(0, i);
  saveState(); renderMessages(); G('msgField').focus();
  toast('Edit message and resend', '');
};

// ═══════════════════════════════════════════════════
// MARKDOWN
// ═══════════════════════════════════════════════════
function parseMarkdown(text) {
  let t = esc(text);
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code class="lang-${l}">${c.trim()}</code></pre>`);
  t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  t = t.replace(/^> (.+)$/gm,   '<blockquote>$1</blockquote>');
  t = t.replace(/^---+$/gm,     '<hr>');
  t = t.replace(/^\- (.+)$/gm,  '<li>$1</li>');
  t = t.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  t = t.split('\n\n').map(p => {
    if (!p.trim()) return '';
    if (/^<(h[1-3]|pre|blockquote|hr|li|ul|ol|div)/.test(p.trim())) return p;
    return `<p>${p.replace(/\n/g,'<br>')}</p>`;
  }).join('');
  return t;
}

// ═══════════════════════════════════════════════════
let pendingFiles = []; // [{name, type, dataUrl, mimeType}]

G('attachBtn').addEventListener('click', () => G('fileInput').click());
G('fileInput').addEventListener('change', async function() {
  const files = Array.from(this.files);
  for (const f of files) {
    const isImage = f.type.startsWith('image/');
    const dataUrl = await readFileAsDataUrl(f);
    pendingFiles.push({ name: f.name, type: isImage ? 'image' : 'file', dataUrl, mimeType: f.type, size: f.size });
  }
  this.value = '';
  renderFileStrip();
});

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function renderFileStrip() {
  const strip = G('file-strip');
  strip.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'file-chip' + (f.type === 'image' ? ' image' : '');
    if (f.type === 'image') {
      chip.innerHTML = `<img class="file-chip-thumb" src="${f.dataUrl}"><span>${esc(f.name)}</span><button class="file-chip-del" data-i="${i}">✕</button>`;
    } else {
      chip.innerHTML = `<span>📎</span><span>${esc(f.name)}</span><button class="file-chip-del" data-i="${i}">✕</button>`;
    }
    chip.querySelector('.file-chip-del').addEventListener('click', function() {
      pendingFiles.splice(parseInt(this.dataset.i), 1);
      renderFileStrip();
    });
    strip.appendChild(chip);
  });
}

// ═══════════════════════════════════════════════════
function send() {
  const text = G('msgField').value.trim();
  if (!text && !pendingFiles.length) return;
  if (!hasAnyKey()) {
    G('keyBtn').click();
    toast('Add at least one API key first', 'warn');
    return;
  }

  let conv = activeConv();
  if (!conv) conv = createConv(text || 'Attached file');

  const userMsg = {
    role: 'user',
    content: text,
    ts: Date.now(),
    files: pendingFiles.length ? [...pendingFiles] : undefined,
  };
  conv.messages.push(userMsg);
  if (conv.messages.length === 1) { conv.title = (text||'Attached').slice(0,50); renderSidebar(); }

  // Clear input
  G('msgField').value = ''; autoResize();
  pendingFiles = []; renderFileStrip();
  saveState(); renderMessages(); updateStats();

  if (state.inputMode === 'image') {
    generateImage(conv, text);
  } else {
    sendToApi(conv);
  }
}

// ═══════════════════════════════════════════════════
// IMAGE GENERATION (OpenAI DALL-E)
// ═══════════════════════════════════════════════════
async function generateImage(conv, prompt) {
  const pid = 'openai';
  const pd = state.providers[pid];
  const key = pd.keys.find(k => k.trim());
  if (!key) {
    pushAiMsg(conv, { role:'assistant', content:'❌ Image generation requires an OpenAI API key. Please add one via 🔑 and select DALL·E 3.', ts:Date.now(), providerId:'openai' });
    return;
  }

  showTyping();

  try {
    const size = G('igSize').value;
    const quality = G('igQuality').value;
    const style = G('igStyle').value;
    const n = parseInt(G('igN').value);

    const res = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+key },
      body: JSON.stringify({ model:'dall-e-3', prompt, n, size, quality, style, response_format:'url' })
    });
    const data = await res.json();
    hideTyping();

    if (!res.ok) {
      pushAiMsg(conv, { role:'assistant', content:'❌ Image generation error: '+(data.error?.message||'Unknown error'), ts:Date.now(), providerId:'openai' });
      return;
    }

    const images = data.data.map(d => d.url);
    const msg = { role:'assistant', type:'image_result', images, content:`Generated ${images.length} image(s)`, ts:Date.now(), providerId:'openai', model:'dall-e-3' };
    conv.messages.push(msg);
    saveState(); renderMessages(); updateStats();
    toast('Image generated!', 'ok');
  } catch (e) {
    hideTyping();
    pushAiMsg(conv, { role:'assistant', content:'❌ Network error generating image.', ts:Date.now(), providerId:'openai' });
  }
}

function pushAiMsg(conv, msg) {
  conv.messages.push(msg);
  saveState(); renderMessages(); updateStats();
}

// ═══════════════════════════════════════════════════
// SEND TO API — WITH FAILOVER
// ═══════════════════════════════════════════════════
async function sendToApi(conv) {
  showTyping();

  const pid = state.activeProviderId || getFirstValidProvider();
  if (!pid) { finishSend(); toast('No API key configured', 'err'); return; }

  const pd = state.providers[pid];
  // Build failover key list
  const allKeys = pd.keys.map((k,i)=>({k:k.trim(),i})).filter(x=>x.k);
  if (!allKeys.length) { finishSend(); toast('No valid keys for '+PROVIDERS[pid].name, 'err'); return; }

  const startPos = allKeys.findIndex(x => x.i === pd.activeKeyIdx);
  const ordered = [...allKeys.slice(startPos >= 0 ? startPos : 0), ...allKeys.slice(0, startPos >= 0 ? startPos : 0)];

  // Build memory context
  const memContext = state.memory.length
    ? 'User memory notes:\n' + state.memory.map(m => '- ' + m.text).join('\n') + '\n\n'
    : '';

  await tryApiKeys(conv, pid, ordered, 0, memContext);
}

async function tryApiKeys(conv, pid, ordered, idx, memContext) {
  if (idx >= ordered.length) {
    finishSend();
    toast('All keys failed — please check your API keys', 'err');
    return;
  }

  const keyObj = ordered[idx];
  const prov = PROVIDERS[pid];
  const model = state.activeModel || prov.models[0].id;

  try {
    let response;

    if (pid === 'anthropic') {
      response = await callAnthropic(conv, prov, keyObj.k, model, memContext);
    } else if (pid === 'google') {
      response = await callGoogle(conv, prov, keyObj.k, model, memContext);
    } else if (pid === 'cohere') {
      response = await callCohere(conv, prov, keyObj.k, model, memContext);
    } else {
      // OpenAI-compatible (mistral, openai, deepseek, xai, groq)
      response = await callOpenAICompat(conv, prov, keyObj.k, model, memContext);
    }

    if (response.error) {
      const status = response.status;
      if (status === 401 || status === 429 || status === 503 || status === 529) {
        toast(`Key ${keyObj.i+1} failed (${status}), trying next…`, 'warn');
        return tryApiKeys(conv, pid, ordered, idx+1, memContext);
      }
      finishSend();
      toast('Error: ' + response.error, 'err');
      return;
    }

    // Success
    const switched = keyObj.i !== state.providers[pid].activeKeyIdx;
    if (switched) {
      state.providers[pid].activeKeyIdx = keyObj.i;
      toast(`⚡ Switched to Key ${keyObj.i+1} — context preserved`, 'warn');
    }

    const aiMsg = {
      role: 'assistant',
      content: response.content,
      ts: Date.now(),
      providerId: pid,
      model,
      keySwitch: switched ? keyObj.i+1 : undefined,
    };
    conv.messages.push(aiMsg);
    saveState(); renderMessages(); updateStats();
    finishSend();
    updateProviderUI();

    // Auto-extract memory from this exchange (runs silently in background)
    autoExtractMemory(conv, pid, keyObj.k);

  } catch(e) {
    toast(`Key ${keyObj.i+1} network error, trying next…`, 'warn');
    return tryApiKeys(conv, pid, ordered, idx+1, memContext);
  }
}

// ═══════════════════════════════════════════════════
// AUTO MEMORY EXTRACTION
// Runs silently after each exchange — extracts only
// meaningful, durable facts about the user.
// ═══════════════════════════════════════════════════
let memExtractionInProgress = false;

async function autoExtractMemory(conv, pid, key) {
  // Only run every 2 messages to avoid spamming, and not if already running
  if (memExtractionInProgress) return;
  if (conv.messages.length < 2) return;

  // Only look at last 6 messages for extraction (recent context)
  const recent = conv.messages.slice(-6);
  const dialogText = recent.map(m => `${m.role === 'user' ? 'User' : 'Assistant'}: ${(m.content||'').slice(0,400)}`).join('\n');

  // Existing memories to avoid duplicates
  const existing = state.memory.map(m => m.text).join('\n');

  const extractPrompt = `You are a memory extraction system. Analyze this conversation excerpt and extract ONLY facts that are:
- Personal facts about the USER (name, job, location, skills, preferences, relationships, goals)
- Durable and reusable across future conversations
- NOT already in the existing memories list

Existing memories:
${existing || '(none yet)'}

Conversation:
${dialogText}

Return a JSON array of strings, each a concise fact (max 12 words). Return [] if nothing new and important. Return ONLY the JSON array, no other text. Examples of good facts: "User's name is Alex", "User works as a Python developer", "User lives in London", "User prefers concise answers", "User is learning machine learning".`;

  memExtractionInProgress = true;
  try {
    const prov = PROVIDERS[pid];
    let result = null;

    // Use whichever provider is active — it's a small, cheap call
    if (pid === 'anthropic') {
      const res = await fetch(prov.endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 256, temperature: 0,
          messages: [{ role: 'user', content: extractPrompt }] })
      });
      const d = await res.json();
      result = d.content?.[0]?.text;
    } else if (pid === 'google') {
      const url = prov.endpoint.replace('{model}', 'gemini-1.5-flash') + '?key=' + key;
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ role:'user', parts:[{ text: extractPrompt }] }], generationConfig: { temperature: 0, maxOutputTokens: 256 } }) });
      const d = await res.json();
      result = d.candidates?.[0]?.content?.parts?.[0]?.text;
    } else {
      // OpenAI-compatible
      const res = await fetch(prov.endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+key },
        body: JSON.stringify({ model: state.activeModel, messages: [{ role:'user', content: extractPrompt }], temperature: 0, max_tokens: 256 })
      });
      const d = await res.json();
      result = d.choices?.[0]?.message?.content;
    }

    if (result) {
      // Strip markdown fences if present
      const clean = result.replace(/```json|```/g,'').trim();
      const facts = JSON.parse(clean);
      if (Array.isArray(facts) && facts.length > 0) {
        let added = 0;
        facts.forEach(fact => {
          if (typeof fact === 'string' && fact.trim().length > 3 && fact.trim().length < 120) {
            // Deduplicate loosely
            const already = state.memory.some(m => m.text.toLowerCase().includes(fact.toLowerCase().slice(0,20)));
            if (!already) {
              addMemory(fact.trim());
              added++;
            }
          }
        });
        if (added > 0) {
          toast(`🧠 Remembered ${added} new fact${added>1?'s':''}`, 'info');
        }
      }
    }
  } catch(e) {
    // Silent fail — memory extraction is best-effort
  } finally {
    memExtractionInProgress = false;
  }
}

// ── Shared system identity ──
const SYSTEM_IDENTITY = `You are HDMI (Hub for Dynamic Model Interaction), a universal AI client that connects to multiple AI providers. If anyone asks what HDMI stands for or what your name means, tell them: "HDMI stands for Hub for Dynamic Model Interaction — a universal interface for connecting to any AI." Be helpful, concise, and clear.`;

function buildSystemPrompt(memContext) {
  return SYSTEM_IDENTITY + (memContext ? '\n\n' + memContext : '');
}

// ── OpenAI-Compatible API (Mistral, OpenAI, DeepSeek, xAI, Groq) ──
async function callOpenAICompat(conv, prov, key, model, memContext) {
  const sysContent = buildSystemPrompt(memContext);
  const messages = [
    { role: 'system', content: sysContent },
    ...buildMessages(conv, prov),
  ];

  const endpoint = model === 'dall-e-3' ? prov.imageEndpoint : prov.endpoint;
  const res = await fetch(endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+key },
    body: JSON.stringify({
      model,
      messages,
      temperature: parseFloat(G('tempSlider').value),
      max_tokens: 4096,
    })
  });
  const data = await res.json();
  if (!res.ok) return { error: data.error?.message || data.message || ('HTTP '+res.status), status: res.status };
  return { content: data.choices?.[0]?.message?.content || '(No response)' };
}

// ── Anthropic Claude ──
async function callAnthropic(conv, prov, key, model, memContext) {
  const systemContent = buildSystemPrompt(memContext);
  const apiMessages = buildMessages(conv, prov);

  const res = await fetch(prov.endpoint, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model,
      system: systemContent,
      messages: apiMessages,
      max_tokens: 4096,
      temperature: parseFloat(G('tempSlider').value),
    })
  });
  const data = await res.json();
  if (!res.ok) return { error: data.error?.message || ('HTTP '+res.status), status: res.status };
  return { content: data.content?.[0]?.text || '(No response)' };
}

// ── Google Gemini ──
async function callGoogle(conv, prov, key, model, memContext) {
  const url = prov.endpoint.replace('{model}', model) + '?key=' + key;
  const sysText = buildSystemPrompt(memContext);
  const googleMessages = buildMessages(conv, prov).map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: sysText }] },
      contents: googleMessages,
      generationConfig: { temperature: parseFloat(G('tempSlider').value), maxOutputTokens: 4096 },
    })
  });
  const data = await res.json();
  if (!res.ok) return { error: data.error?.message || ('HTTP '+res.status), status: res.status };
  return { content: data.candidates?.[0]?.content?.parts?.[0]?.text || '(No response)' };
}

// ── Cohere ──
async function callCohere(conv, prov, key, model, memContext) {
  const messages = buildMessages(conv, prov);
  const chatHistory = messages.slice(0,-1).map(m => ({
    role: m.role === 'assistant' ? 'CHATBOT' : 'USER',
    message: m.content
  }));
  const lastMsg = messages[messages.length-1]?.content || '';
  const sysText = buildSystemPrompt(memContext);

  const res = await fetch(prov.endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+key },
    body: JSON.stringify({ model, message: lastMsg, chat_history: chatHistory, preamble: sysText, temperature: parseFloat(G('tempSlider').value) })
  });
  const data = await res.json();
  if (!res.ok) return { error: data.message || ('HTTP '+res.status), status: res.status };
  return { content: data.text || '(No response)' };
}

// ── Build messages with vision support ──
function buildMessages(conv, prov) {
  return conv.messages.map(m => {
    // Check for image attachments
    if (m.files && m.files.some(f => f.type === 'image')) {
      // Build multimodal message (for vision-capable models)
      const imageParts = m.files.filter(f => f.type === 'image').map(f => ({
        type: 'image_url',
        image_url: { url: f.dataUrl }
      }));
      return {
        role: m.role,
        content: [
          ...imageParts,
          { type: 'text', text: m.content || '' }
        ]
      };
    }
    return { role: m.role, content: m.content || '' };
  }).filter(m => m.content && (typeof m.content === 'string' ? m.content.trim() : true));
}

});
G('sendBtn').addEventListener('click', send);
